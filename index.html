<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#050507;
  --frost:#e8f4f8;
  --silver:#a8b2c1;
  --silver-dim:#6b7585;
  --font-editorial:'Cormorant Garamond',serif;
  --font-tech:'Space Mono',monospace
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);cursor:none}

/* ── CURSOR (desktop only) ── */
.cur{position:fixed;width:5px;height:5px;background:var(--frost);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
.ring{position:fixed;width:26px;height:26px;border:1px solid rgba(168,178,193,.12);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s}

/* ── VIDEO ── */
#bgVideo{
  position:fixed;top:50%;left:50%;
  width:100vw;height:100vh;
  transform:translate(-50%,-50%);
  object-fit:cover;
  z-index:0;
  filter:grayscale(0.72) brightness(0.62) contrast(1.15) saturate(0.4);
}

/* ── VIGNETTE ── */
#vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,
    transparent 25%,
    rgba(5,5,7,.45) 65%,
    rgba(5,5,7,.85) 100%
  );
}

/* ── SCANLINES ── */
#scanlines{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px
  );
}

/* ── GRAIN ── */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9000;opacity:.42
}

/* ── SIGIL TOP LEFT ── */
.sigil-tl{
  position:fixed;
  top:clamp(.9rem,4vw,2.2rem);
  left:clamp(.9rem,4vw,2.8rem);
  z-index:10;pointer-events:none;
  opacity:0;animation:fadeIn 2s ease forwards 2.8s
}
.sigil-tl img{
  height:clamp(28px,5vw,42px);
  mix-blend-mode:screen;opacity:.08;display:block
}

/* ── VOL TAG TOP RIGHT ── */
.vol-tag{
  position:fixed;
  top:clamp(.9rem,4vw,2.2rem);
  right:clamp(.9rem,4vw,2.8rem);
  font-family:var(--font-tech);
  font-size:clamp(6px,1.4vw,8px);
  font-weight:400;letter-spacing:.22em;
  text-transform:uppercase;color:var(--frost);
  opacity:0;animation:fadeIn 2s ease forwards 3.2s;
  z-index:10;pointer-events:none;line-height:1.8;text-align:right
}

/* ── SIGIL RIGHT MIDDLE — oculto no mobile ── */
.sigil-side{
  position:fixed;right:clamp(.8rem,1.5vw,1.5rem);top:50%;
  transform:translateY(-50%);
  z-index:10;pointer-events:none;
  opacity:0;animation:fadeIn 2.5s ease forwards 4s
}
.sigil-side img{height:55px;mix-blend-mode:screen;opacity:.05}

/* ── SIDE LABEL LEFT — oculto no mobile ── */
.side-label{
  position:fixed;left:clamp(.6rem,1.2vw,1.3rem);top:50%;
  transform:translateY(-50%) rotate(-90deg);
  font-family:var(--font-tech);font-size:7px;font-weight:400;
  letter-spacing:.35em;color:var(--frost);opacity:.04;
  text-transform:uppercase;white-space:nowrap;
  z-index:10;pointer-events:none
}

/* ── STAGE CENTER ── */
#stage{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
  /* No mobile: empurra um pouco para cima do centro */
  padding-bottom:8vh
}

/* ── TAGLINE ── */
#tagline{
  font-family:var(--font-editorial);
  font-style:italic;font-weight:300;
  font-size:clamp(1.1rem,6.5vw,3.6rem);
  letter-spacing:clamp(.14em,1.5vw,.28em);
  color:rgba(220,228,240,.78);
  text-align:center;
  line-height:1;text-transform:lowercase;
  text-shadow:
    0 0 80px rgba(168,180,220,.15),
    0 0 2px rgba(5,5,7,.9),
    0 0 40px rgba(100,120,180,.08);
  opacity:0;
  animation:conjure 3.5s ease forwards 1.2s;
  padding:0 clamp(1rem,6vw,3rem);
}

@keyframes conjure{
  0%  {opacity:0;letter-spacing:.06em;filter:blur(8px);text-shadow:0 0 120px rgba(168,178,220,.4),0 0 2px rgba(5,5,7,.9)}
  15% {opacity:.18;letter-spacing:.10em;filter:blur(4px)}
  25% {opacity:.07;filter:blur(6px)}
  35% {opacity:.55;letter-spacing:.18em;filter:blur(1.5px)}
  45% {opacity:.38;filter:blur(2px)}
  60% {opacity:.75;filter:blur(.5px)}
  70% {opacity:.62;filter:blur(1px)}
  82% {opacity:.85;filter:blur(.2px)}
  100%{opacity:1;filter:blur(0);
       text-shadow:0 0 80px rgba(168,180,220,.12),0 0 2px rgba(5,5,7,.9)}
}

#tagline.alive{animation:breathe 8s ease-in-out infinite}

@keyframes breathe{
  0%  {opacity:.88;text-shadow:0 0 60px rgba(168,180,220,.08),0 0 2px rgba(5,5,7,.9)}
  50% {opacity:.75;text-shadow:0 0 110px rgba(168,180,220,.18),0 0 2px rgba(5,5,7,.9),0 0 60px rgba(100,120,180,.1)}
  100%{opacity:.88;text-shadow:0 0 60px rgba(168,180,220,.08),0 0 2px rgba(5,5,7,.9)}
}

/* ── SEPARADOR ── */
#sep{width:1px;height:0;background:rgba(168,178,193,.14);margin-top:2rem;animation:growLine 1.8s 4.2s ease forwards}
@keyframes growLine{to{height:36px}}

/* ── BREATH DOT ── */
.breath{
  position:fixed;bottom:clamp(.8rem,3vh,1.5rem);left:50%;
  transform:translateX(-50%);z-index:10;pointer-events:none;
  opacity:0;animation:fadeIn 1.5s ease forwards 4.5s
}
.breath-dot{width:2px;height:2px;border-radius:50%;background:var(--silver-dim);animation:dotBreathe 5s ease-in-out infinite}
@keyframes dotBreathe{0%,100%{opacity:.08;transform:scale(.6)}50%{opacity:.35;transform:scale(1.3)}}

/* ── UTILS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── RESPONSIVE ── */
/* Tablet portrait */
@media(max-width:768px){
  .side-label,.sigil-side{display:none}
}
/* Mobile pequeno */
@media(max-width:480px){
  #stage{padding-bottom:14vh}
}
/* Cursor & hover states */
@media(hover:none){
  body{cursor:auto}
  .cur,.ring{display:none}
}
/* Safe area para iPhone notch/home bar */
@supports(padding:max(0px)){
  .sigil-tl{top:max(.9rem,env(safe-area-inset-top) + .5rem);left:max(.9rem,env(safe-area-inset-left) + .5rem)}
  .vol-tag{top:max(.9rem,env(safe-area-inset-top) + .5rem);right:max(.9rem,env(safe-area-inset-right) + .5rem)}
  .breath{bottom:max(.8rem,env(safe-area-inset-bottom) + .5rem)}
}
</style>
</head>

<!-- STAGE: frase -->
<div id="stage">
  <p id="tagline">unleash the enigma</p>
  <div id="sep"></div>
</div>

<!-- BREATH DOT -->
<div class="breath"><div class="breath-dot"></div></div>

<script>
/* ══════════════════════════════════════════
   CONFIGURAÇÃO DE VÍDEOS
   Substitua pelos caminhos reais dos seus arquivos.
   ══════════════════════════════════════════ */
const VIDEOS = {
  // 1 vídeo horizontal (desktop / landscape)
  landscape: "dp-hero-storyteller.mp4",

  // 3 vídeos verticais (mobile / portrait) — sorteados por sessão
  portrait: [
    "dp-hero-storyteller.mp4",
    "dp-hero-him.mp4",
    "dp-hero-her.mp4"
  ]
};
/* ══════════════════════════════════════════ */


/* ── SELEÇÃO DE VÍDEO ──
   Detecta orientação e escolhe o vídeo correto.
   No portrait: sorteia 1 dos 3 e salva na sessão
   (o mesmo vídeo é mantido durante toda a navegação,
   muda apenas ao fechar e reabrir o browser).
   ─────────────────────────────────────────── */
function pickVideo() {
  const isPortrait = window.matchMedia("(orientation: portrait)").matches
                  || window.innerWidth < window.innerHeight;

  if (!isPortrait) {
    return VIDEOS.landscape;
  }

  // Verifica se já sorteiou nesta sessão
  const stored = sessionStorage.getItem("dp_portrait_video");
  if (stored) return stored;

  // Sorteia e salva
  const idx  = Math.floor(Math.random() * VIDEOS.portrait.length);
  const pick = VIDEOS.portrait[idx];
  sessionStorage.setItem("dp_portrait_video", pick);
  return pick;
}

/* ── INICIALIZA VÍDEO ── */
const vid = document.getElementById("bgVideo");

function loadVideo(src) {
  vid.src = src;
  vid.load();
  vid.play().catch(() => {});
}

loadVideo(pickVideo());

/* ── FORWARD / REVERSE LOOP ── */
let reversing = false;
let rafId     = null;

function startReverse() {
  reversing = true;
  function step() {
    if (!reversing) return;
    if (vid.currentTime <= 0.04) {
      reversing = false;
      vid.currentTime = 0;
      vid.play().catch(() => {});
      return;
    }
    vid.currentTime = Math.max(0, vid.currentTime - 0.033);
    rafId = requestAnimationFrame(step);
  }
  rafId = requestAnimationFrame(step);
}

vid.addEventListener("ended", () => {
  cancelAnimationFrame(rafId);
  startReverse();
});

/* Fallback para autoplay bloqueado */
document.addEventListener("click",     () => vid.play().catch(() => {}), { once: true });
document.addEventListener("touchstart",() => vid.play().catch(() => {}), { once: true });

/* ── TROCA DE ORIENTAÇÃO ──
   Se o usuário rotacionar o dispositivo durante a visita,
   troca para o vídeo correto (sem resetar o sorteio de portrait).
   ─────────────────────────────────────────── */
window.matchMedia("(orientation: portrait)").addEventListener("change", () => {
  cancelAnimationFrame(rafId);
  reversing = false;
  loadVideo(pickVideo());
});

/* ── CURSOR (desktop) ── */
const curEl  = document.getElementById("cur");
const ringEl = document.getElementById("ring");
let cmx = 0, cmy = 0, crx = 0, cry = 0;
document.addEventListener("mousemove", e => {
  cmx = e.clientX; cmy = e.clientY;
  curEl.style.left = cmx + "px";
  curEl.style.top  = cmy + "px";
});
(function cL() {
  crx += (cmx - crx) * .07;
  cry += (cmy - cry) * .07;
  ringEl.style.left = crx + "px";
  ringEl.style.top  = cry + "px";
  requestAnimationFrame(cL);
})();

/* ── TAGLINE: breathing após conjure ── */
const tagline = document.getElementById("tagline");
tagline.addEventListener("animationend", () => {
  tagline.classList.add("alive");
}, { once: true });

/* ── GRAIN DINÂMICO ── */
(function() {
  const cvs = document.createElement("canvas");
  cvs.style.cssText = "position:fixed;inset:0;z-index:9001;opacity:.028;pointer-events:none;";
  document.body.appendChild(cvs);
  const ctx = cvs.getContext("2d");
  let w, h, frame = 0;
  function resize() { w = cvs.width = innerWidth; h = cvs.height = innerHeight; }
  function noise() {
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0;
      d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }
  function loop() { if (++frame % 3 === 0) noise(); requestAnimationFrame(loop); }
  resize();
  window.addEventListener("resize", resize);
  loop();
})();
</script>
